<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Map — Dillo</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="map">

<header class="site-header">
  <div class="nav">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 44 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 26c0-2 1-3 3-3h2V15c0-3 2.5-6 6-6 1 0 2 .3 2.8.8L21 8c-.8-1-1.3-2.2-1.3-3.5C19.7 2 21.7 0 24.2 0s4.5 2 4.5 4.5c0 1.7-.9 3.2-2.3 4v9.5c0 3-1 5-3 6.5 1 1.3 1.6 2.3 1.6 3.5H6z" fill="var(--green)"/>
        <circle cx="24" cy="4.3" r="1.3" fill="var(--bg)"/>
      </svg>
      Dillo
      <span class="tag">Buy. Sell. Discover.</span>
    </a>
    <nav class="nav-links">
      <a href="index.html" data-page="home">Home</a>
      <a href="buy.html" data-page="buy">Buy</a>
      <a href="sell.html" data-page="sell">Sell</a>
      <a href="map.html" data-page="map">Map</a>
      <a href="support.html" data-page="support">Support</a>
    </nav>
    <div class="nav-right" id="navUserSlot"></div>
  </div>
</header>

<section class="map-page-section" style="padding-top:40px;">
  <div class="container">
    <div class="eyebrow">Server map</div>
    <h1 style="font-family:var(--font-display); font-size: clamp(30px,4vw,44px); font-weight:600; margin:0 0 8px;">See where everything sits</h1>
    <p style="color:var(--text-muted); max-width:520px; margin:0 0 24px;">Cross-check any listing's coordinates against the live map before you buy.</p>

    <div class="map-wrap" id="mapWrap"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <div class="footer-row">
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="buy.html">Buy</a>
        <a href="sell.html">Sell</a>
        <a href="map.html">Map</a>
        <a href="support.html">Support</a>
      </div>
      <a class="btn btn-outline" href="https://discord.gg/hYCcvPgsdB" target="_blank" rel="noopener">Join the Discord</a>
    </div>
    <div class="footer-fine">
      <span>Dillo — a Democracycraft property exchange.</span>
      <button class="admin-trigger" id="adminTrigger" aria-label="settings">·</button>
    </div>
    <div class="admin-inline" id="adminInline">
      <input type="password" placeholder="code" />
      <button class="go">Go</button>
    </div>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
  const wrap = document.getElementById("mapWrap");
  if (CONFIG.MAP_EMBED_URL) {
    wrap.innerHTML = `<iframe src="${CONFIG.MAP_EMBED_URL}" width="100%" height="100%" style="border:0;" allowfullscreen loading="lazy" title="Democracycraft live map"></iframe>`;
  } else {
    wrap.innerHTML = `
      <div class="map-placeholder">
        <h3>Map isn't connected yet</h3>
        <p>Once the server's dynmap or BlueMap link is set, it'll render right here.</p>
        <a class="btn btn-outline" href="https://discord.gg/hYCcvPgsdB" target="_blank" rel="noopener">Ask on Discord</a>
      </div>
    `;
  }
</script>
</body>
</html>

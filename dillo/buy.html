<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Buy — Dillo</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="buy">

<header class="site-header">
  <div class="nav">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 44 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 26c0-2 1-3 3-3h2V15c0-3 2.5-6 6-6 1 0 2 .3 2.8.8L21 8c-.8-1-1.3-2.2-1.3-3.5C19.7 2 21.7 0 24.2 0s4.5 2 4.5 4.5c0 1.7-.9 3.2-2.3 4v9.5c0 3-1 5-3 6.5 1 1.3 1.6 2.3 1.6 3.5H6z" fill="var(--green)"/>
        <circle cx="24" cy="4.3" r="1.3" fill="var(--bg)"/>
      </svg>
      Dillo
      <span class="tag">Buy. Sell. Discover.</span>
    </a>
    <nav class="nav-links">
      <a href="index.html" data-page="home">Home</a>
      <a href="buy.html" data-page="buy">Buy</a>
      <a href="sell.html" data-page="sell">Sell</a>
      <a href="map.html" data-page="map">Map</a>
      <a href="support.html" data-page="support">Support</a>
    </nav>
    <div class="nav-right" id="navUserSlot"></div>
  </div>
</header>

<section style="padding-top:56px; padding-bottom: 20px;">
  <div class="container">
    <div class="eyebrow">Live listings</div>
    <h1 style="font-family:var(--font-display); font-size: clamp(30px,4vw,44px); font-weight:600; margin:0 0 8px;">What are you moving into?</h1>
    <p style="color:var(--text-muted); max-width:520px; margin:0 0 30px;">Every plot, build, and base currently for sale on Democracycraft.</p>

    <div id="adminBadgeSlot"></div>

    <div class="filters">
      <div class="chip-row" id="categoryChips">
        <button class="chip active" data-cat="All">All</button>
        <button class="chip" data-cat="Plot">Plots</button>
        <button class="chip" data-cat="Build">Builds</button>
        <button class="chip" data-cat="Base">Bases</button>
        <button class="chip" data-cat="Shop">Shops</button>
      </div>
      <div class="filter-row">
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="Search by title, coords, or seller" />
        </div>
        <div class="sort-wrap">
          <select id="sortSelect">
            <option value="newest">Newest first</option>
            <option value="price-asc">Price: low to high</option>
            <option value="price-desc">Price: high to low</option>
          </select>
        </div>
      </div>
    </div>

    <div class="results-count" id="resultsCount"></div>
    <div class="listing-grid" id="listingGrid"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <div class="footer-row">
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="buy.html">Buy</a>
        <a href="sell.html">Sell</a>
        <a href="map.html">Map</a>
        <a href="support.html">Support</a>
      </div>
      <a class="btn btn-outline" href="https://discord.gg/hYCcvPgsdB" target="_blank" rel="noopener">Join the Discord</a>
    </div>
    <div class="footer-fine">
      <span>Dillo — a Democracycraft property exchange.</span>
      <button class="admin-trigger" id="adminTrigger" aria-label="settings">·</button>
    </div>
    <div class="admin-inline" id="adminInline">
      <input type="password" placeholder="code" />
      <button class="go">Go</button>
    </div>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
  let allListings = [];
  let activeCategory = "All";

  async function init() {
    allListings = await loadListings();
    renderAdminBadge();
    render();
  }

  function renderAdminBadge() {
    const slot = document.getElementById("adminBadgeSlot");
    slot.innerHTML = isAdmin()
      ? `<div class="admin-badge">Admin tools on — you can remove listings below</div>`
      : "";
  }

  function getFiltered() {
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    const sort = document.getElementById("sortSelect").value;

    let list = allListings.filter((l) => {
      const matchesCat = activeCategory === "All" || l.category === activeCategory;
      const hay = `${l.title} ${l.coords} ${l.sellerUsername}`.toLowerCase();
      const matchesQ = !q || hay.includes(q);
      return matchesCat && matchesQ;
    });

    if (sort === "price-asc") list.sort((a, b) => a.price - b.price);
    else if (sort === "price-desc") list.sort((a, b) => b.price - a.price);
    else list.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

    return list;
  }

  function render() {
    const grid = document.getElementById("listingGrid");
    const list = getFiltered();
    document.getElementById("resultsCount").textContent = `${list.length} result${list.length === 1 ? "" : "s"}`;

    if (!list.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>Nothing matches yet</h3><p>Try a different category or search term.</p></div>`;
      return;
    }

    grid.innerHTML = list.map(cardHtml).join("");

    grid.querySelectorAll("[data-buy]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const listing = allListings.find((l) => l.id === btn.dataset.buy);
        if (listing) openBuyFlow(listing);
      });
    });
    grid.querySelectorAll("[data-remove]").forEach((btn) => {
      btn.addEventListener("click", () => onRemove(btn.dataset.remove));
    });
  }

  function cardHtml(l) {
    return `
      <div class="card">
        <div class="thumb" style="background-image:url('${escapeHtml(l.image)}')">
          <span class="cat">${escapeHtml(l.category || "Listing")}</span>
        </div>
        <div class="body">
          <h3>${escapeHtml(l.title)}</h3>
          <div class="coords">${escapeHtml(l.coords)}</div>
          <div class="desc">${escapeHtml(l.description)}</div>
          <div class="meta">
            <span class="price">${formatPrice(l.price)}</span>
            <span class="seller">by ${escapeHtml(l.sellerUsername)}</span>
          </div>
          <div class="actions">
            <button class="btn btn-primary btn-block" data-buy="${l.id}">Buy</button>
            ${isAdmin() ? `<button class="btn btn-danger" data-remove="${l.id}">Remove</button>` : ""}
          </div>
        </div>
      </div>
    `;
  }

  function onRemove(id) {
    if (!confirm("Remove this listing? This can't be undone on this device.")) return;
    removeListingById(id);
    allListings = allListings.filter((l) => l.id !== id);
    render();
    showToast("Listing removed.");
  }

  document.getElementById("categoryChips").addEventListener("click", (e) => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    document.querySelectorAll("#categoryChips .chip").forEach((c) => c.classList.remove("active"));
    chip.classList.add("active");
    activeCategory = chip.dataset.cat;
    render();
  });

  document.getElementById("searchInput").addEventListener("input", render);
  document.getElementById("sortSelect").addEventListener("change", render);
  document.addEventListener("dillo:adminunlocked", () => {
    renderAdminBadge();
    render();
  });

  init();
</script>
</body>
</html>
